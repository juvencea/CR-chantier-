<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="CR Chantier">
<meta name="theme-color" content="#2d4a6b">
<title>CR Chantier</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.umd.min.js"></script>
<style>
:root {
  --bg:#f4f2ee; --card:#fff; --text:#1c1c1e; --text2:#6b6b70; --text3:#9a9aa0;
  --accent:#2d4a6b; --accent2:#4a7fa5; --border:#dddbd5;
  --green:#2d6a4f; --green-bg:#eaf4ef; --amber:#7a5c00; --amber-bg:#fef8e6;
  --red:#8b2020; --red-bg:#fdeaea; --radius:14px; --radius-sm:9px;
  --shadow:0 2px 12px rgba(0,0,0,0.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);overscroll-behavior:none}

/* ── LAYOUT MOBILE ── */
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto}
#topbar{background:var(--accent);color:#fff;padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
#topbar-left{flex:1;min-width:0}
#topbar h1{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#topbar .sub{font-size:11px;opacity:.7;font-family:'DM Mono',monospace}
#topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.chantier-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;border-radius:8px;padding:5px 10px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap}
#tab-bar{background:var(--card);border-bottom:1px solid var(--border);display:flex;flex-shrink:0}
.tab{flex:1;padding:11px 4px;text-align:center;font-size:12px;font-weight:500;color:var(--text2);border-bottom:2.5px solid transparent;cursor:pointer;transition:all .15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 14px 100px}
#bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:1px solid var(--border);padding:10px 14px;padding-bottom:calc(10px + env(safe-area-inset-bottom));display:flex;gap:10px;z-index:100}

/* ── TABLET/iPad ── */
@media(min-width:768px){
  html,body{overflow:hidden}
  #app{max-width:100%;height:100vh}
  #topbar{padding:16px 28px}
  #topbar h1{font-size:18px}
  #tab-bar{padding:0 20px}
  .tab{font-size:13px;padding:13px 16px;flex:none}
  #main-split{display:flex;flex:1;overflow:hidden}
  #sidebar{width:260px;min-width:220px;background:var(--card);border-right:1px solid var(--border);overflow-y:auto;padding:16px 14px 20px;flex-shrink:0}
  #content{flex:1;overflow-y:auto;padding:20px 24px 100px}
  #bottom-bar{position:sticky;bottom:0;left:0;transform:none;max-width:100%;width:100%;padding:12px 24px}
}
@media(min-width:1100px){
  #sidebar{width:300px}
  #content{max-width:780px}
  #topbar{padding:16px 36px}
  #bottom-bar{padding:14px 36px}
}

/* ── COMPOSANTS ── */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:14px 14px 12px;margin-bottom:12px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.card-subtitle{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:10px;margin-top:-6px}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;font-weight:500}
input[type=text],input[type=date],textarea,select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:15px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--accent2);background:#fff}
textarea{resize:none;min-height:90px;line-height:1.5}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.form-full{margin-bottom:12px}
.presence-row{display:flex;gap:7px;margin-bottom:10px}
.pres-btn{flex:1;padding:7px 4px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;text-align:center;transition:all .15s}
.pres-btn.P{background:var(--green-bg);color:var(--green);border-color:#a8d5be}
.pres-btn.E{background:var(--amber-bg);color:var(--amber);border-color:#f5d87a}
.pres-btn.A{background:var(--red-bg);color:var(--red);border-color:#f0a8a8}
.note-wrap{position:relative}
.note-wrap textarea{padding-right:44px}
.mic-btn{position:absolute;right:8px;bottom:8px;width:32px;height:32px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.mic-hint{font-size:11px;color:var(--text3);margin-top:4px}
.btn{flex:1;padding:12px;border-radius:var(--radius-sm);border:none;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s}
.btn-outline{background:var(--bg);border:1px solid var(--border);color:var(--text2)}
.btn-primary{background:var(--accent);color:#fff}
.btn:active{transform:scale(.97)}
.intervenant-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border)}
.intervenant-row:last-child{border-bottom:none}
.int-info{flex:1}
.int-lot{font-size:12px;font-weight:600;color:var(--accent)}
.int-name{font-size:13px;color:var(--text)}
.int-co{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.edit-btn{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);font-size:12px;color:var(--text2);cursor:pointer}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--card);border-radius:var(--radius) var(--radius) 0 0;padding:20px 16px;padding-bottom:calc(20px + env(safe-area-inset-bottom));width:100%;max-width:520px;max-height:85vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:14px}
.modal-btns{display:flex;gap:10px;margin-top:14px}
#toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--accent);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;z-index:300;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.convoc-check{display:flex;align-items:center;gap:7px;margin-top:6px}
.convoc-check input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent);flex-shrink:0}
.convoc-check label{font-size:12px;color:var(--text2);margin:0}

/* ── ÉCRAN CHANTIERS ── */
#screen-chantiers{position:fixed;inset:0;background:var(--bg);z-index:400;display:flex;flex-direction:column}
.chantiers-header{background:var(--accent);color:#fff;padding:20px 20px 16px}
.chantiers-header h1{font-size:20px;font-weight:600}
.chantiers-header p{font-size:13px;opacity:.7;margin-top:3px}
.chantiers-list{flex:1;overflow-y:auto;padding:16px}
.chantier-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin-bottom:10px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s}
.chantier-card:active{transform:scale(.98)}
.chantier-card-info{flex:1;min-width:0}
.chantier-card-name{font-size:15px;font-weight:600;color:var(--text)}
.chantier-card-addr{font-size:12px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chantier-card-meta{font-size:11px;color:var(--text2);margin-top:4px;font-family:'DM Mono',monospace}
.chantier-card-arrow{font-size:20px;color:var(--text3);flex-shrink:0}
.new-chantier-btn{margin:0 16px 20px;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;width:calc(100% - 32px);text-align:center}

/* ── SIDEBAR ── */
.sidebar-section{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin:16px 0 8px}
.sidebar-lot{padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;border:1px solid transparent;margin-bottom:4px;transition:all .12s}
.sidebar-lot:hover{background:var(--bg)}
.sidebar-lot.active{background:#e8eef5;border-color:#b8cfe0}
.sidebar-lot-label{font-size:13px;font-weight:500;color:var(--text)}
.sidebar-lot-co{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:1px}
.sidebar-pres{display:inline-block;padding:1px 7px;border-radius:8px;font-size:11px;font-weight:500;margin-top:3px}
.sidebar-pres.P{background:var(--green-bg);color:var(--green)}
.sidebar-pres.E{background:var(--amber-bg);color:var(--amber)}
.sidebar-pres.A{background:var(--red-bg);color:var(--red)}
.sidebar-phase-tabs{display:flex;gap:4px;margin-bottom:12px}
.sidebar-phase-tab{flex:1;padding:6px 4px;text-align:center;font-size:11px;font-weight:500;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;transition:all .12s}
.sidebar-phase-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>
</head>
<body>

<!-- ÉCRAN SÉLECTION CHANTIER -->
<div id="screen-chantiers">
  <div class="chantiers-header">
    <h1>Mes Chantiers</h1>
    <p>Sélectionnez un chantier pour continuer</p>
  </div>
  <div class="chantiers-list" id="chantiers-list"></div>
  <button class="new-chantier-btn" onclick="newChantier()">+ Nouveau chantier</button>
</div>

<!-- APP PRINCIPALE -->
<div id="app" style="display:none">
  <div id="topbar">
    <div id="topbar-left">
      <div id="topbar-title" class="sub">CR Chantier</div>
      <h1 id="topbar-mo">—</h1>
    </div>
    <div id="topbar-right">
      <div id="topbar-num" style="font-family:'DM Mono',monospace;font-size:20px;font-weight:600;opacity:.9">—</div>
      <button class="chantier-btn" onclick="showChantiers()">⇄ Chantiers</button>
    </div>
  </div>
  <div id="tab-bar">
    <div class="tab active" data-tab="saisie" onclick="switchTab('saisie')">Saisie</div>
    <div class="tab" data-tab="meta" onclick="switchTab('meta')">Réunion</div>
    <div class="tab" data-tab="intervenants" onclick="switchTab('intervenants')">Équipe</div>
    <div class="tab" data-tab="config" onclick="switchTab('config')">Config</div>
  </div>
  <div id="main-split">
    <div id="sidebar" style="display:none"></div>
    <div id="content"></div>
  </div>
  <div id="bottom-bar"></div>
</div>

<div id="toast"></div>
<div id="modal-bg" class="modal-bg" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<script>
// ─── DONNÉES PAR DÉFAUT ───────────────────────────────────────────────────────
const DEFAULT_LOTS = [
  {id:"go",      label:"Gros Œuvre Étendu",     company:"AECTIS",                contact:"M. Michelotti",  tel:"",              mail:"aectis@yahoo.fr"},
  {id:"elec",    label:"Électricité",            company:"INOLYS",                contact:"M. Halluin",    tel:"07 60 49 11 30", mail:"contact.inolys@gmail.com"},
  {id:"plomb",   label:"Plomberie",              company:"VERKRUYSSEN",           contact:"M. Verkruyssen",tel:"06 71 89 31 30", mail:"ludovic@verkruyssen.fr"},
  {id:"vitrerie",label:"Vitrerie",               company:"ATELIER DU VERRE",      contact:"M. Fermont",    tel:"03 20 83 17 25", mail:"contact@ateliercreations.com"},
  {id:"peinture",label:"Peinture",               company:"DESSAUVAGES & FILS",    contact:"M. Trannin",    tel:"06 88 64 53 97", mail:"atrannin@dessauvagesetfils.fr"},
  {id:"parquet", label:"Parquet",                company:"INTERIEURS & PARQUETS", contact:"M. Masson",     tel:"03 20 17 17 08", mail:"iepadministratif@free.fr"},
  {id:"menuext", label:"Menuiserie Extérieure",  company:"ARENORD",               contact:"M. Moerman",    tel:"06 68 22 41 77", mail:"menuiserie@arenord.fr"},
  {id:"agence",  label:"Agencement",             company:"Ets DESTAILLEUR",       contact:"M. Destailleur",tel:"06 09 63 25 97", mail:"ets.destailleur@online.fr"},
];

const BOULANGE_CHANTIER = {
  id: "boulange",
  mo: "M. BOULANGÉ",
  adresse: "78 rue de l'Égalité – 59290 Wasquehal",
  operation: "RÉNOVATION HABITATION",
  moe_societe: "JUVENCEA",
  moe_contact: "M. Perron",
  moe_tel: "06 19 16 46 69",
  moe_mail: "jeanmarc.perron@juvencea.com",
  lots: DEFAULT_LOTS.map(l => ({...l})),
  meta: { num:"12", date: today(), next:"", phase:"Phase 2 Exécution", chef:"", tech:"", code_cles:"2018", note_gen:"" },
  saisie: {},
  createdAt: Date.now(),
};

function today() {
  return new Date().toISOString().split('T')[0];
}

// ─── ÉTAT GLOBAL ─────────────────────────────────────────────────────────────
let chantiers = [];     // liste de tous les chantiers
let currentId = null;  // id du chantier actif
let currentTab = 'saisie';
let currentPhase = 'B';
let currentLot = null;

// Raccourcis vers le chantier actif
const C = () => chantiers.find(c => c.id === currentId) || chantiers[0];
const cfg = () => C();
const lots = () => C().lots;
const meta = () => C().meta;
const saisie = () => C().saisie;

// ─── PERSISTENCE ─────────────────────────────────────────────────────────────
function save() {
  localStorage.setItem('cr_chantiers', JSON.stringify(chantiers));
  localStorage.setItem('cr_current', currentId);
}

function load() {
  try {
    const raw = localStorage.getItem('cr_chantiers');
    chantiers = raw ? JSON.parse(raw) : [];
  } catch(e) { chantiers = []; }
  // Migration : si ancien format (cr_cfg), importer
  if (chantiers.length === 0) {
    try {
      const oldCfg = JSON.parse(localStorage.getItem('cr_cfg') || 'null');
      const oldLots = JSON.parse(localStorage.getItem('cr_lots') || 'null');
      const oldMeta = JSON.parse(localStorage.getItem('cr_meta') || 'null');
      const oldSaisie = JSON.parse(localStorage.getItem('cr_saisie') || 'null');
      if (oldCfg || oldMeta) {
        const migrated = JSON.parse(JSON.stringify(BOULANGE_CHANTIER));
        if (oldCfg) Object.assign(migrated, oldCfg);
        if (oldLots) migrated.lots = oldLots;
        if (oldMeta) migrated.meta = {...migrated.meta, ...oldMeta};
        if (oldSaisie) migrated.saisie = oldSaisie;
        chantiers = [migrated];
      }
    } catch(e) {}
  }
  if (chantiers.length === 0) {
    chantiers = [JSON.parse(JSON.stringify(BOULANGE_CHANTIER))];
  }
  currentId = localStorage.getItem('cr_current') || chantiers[0].id;
  if (!chantiers.find(c => c.id === currentId)) currentId = chantiers[0].id;
}

// ─── ÉCRAN CHANTIERS ─────────────────────────────────────────────────────────
function showChantiers() {
  document.getElementById('screen-chantiers').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  renderChantiersList();
}

function renderChantiersList() {
  const list = document.getElementById('chantiers-list');
  if (chantiers.length === 0) {
    list.innerHTML = '<p style="text-align:center;color:var(--text3);padding:40px 20px">Aucun chantier — créez-en un ci-dessous</p>';
    return;
  }
  list.innerHTML = chantiers.map(c => {
    const nCR = c.meta.num || '—';
    const dateStr = c.meta.date ? new Date(c.meta.date + 'T12:00:00').toLocaleDateString('fr-FR') : '—';
    return `<div class="chantier-card" onclick="openChantier('${c.id}')">
      <div class="chantier-card-info">
        <div class="chantier-card-name">${c.mo || 'Chantier sans nom'}</div>
        <div class="chantier-card-addr">${c.adresse || ''}</div>
        <div class="chantier-card-meta">CR N°${nCR} · ${dateStr} · ${c.operation || ''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
        <div class="chantier-card-arrow">›</div>
        <button onclick="event.stopPropagation();editChantierInfo('${c.id}')" style="padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);font-size:11px;color:var(--text2);cursor:pointer">⚙ Config</button>
      </div>
    </div>`;
  }).join('');
}

function openChantier(id) {
  currentId = id;
  currentLot = null;
  currentPhase = 'B';
  save();
  document.getElementById('screen-chantiers').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  render();
}

function newChantier() {
  const id = 'c_' + Date.now();
  const nouveau = {
    id,
    mo: '',
    adresse: '',
    operation: '',
    moe_societe: 'JUVENCEA',
    moe_contact: 'M. Perron',
    moe_tel: '06 19 16 46 69',
    moe_mail: 'jeanmarc.perron@juvencea.com',
    lots: DEFAULT_LOTS.map(l => ({...l})),
    meta: { num:'1', date: today(), next:'', phase:'Phase 1 Exécution', chef:'', tech:'', code_cles:'', note_gen:'' },
    saisie: {},
    createdAt: Date.now(),
  };
  chantiers.push(nouveau);
  save();
  editChantierInfo(id, true);
}

function editChantierInfo(id, isNew = false) {
  const c = chantiers.find(x => x.id === id);
  document.getElementById('modal-content').innerHTML = `
    <h3>${isNew ? 'Nouveau chantier' : 'Modifier le chantier'}</h3>
    <div class="form-full"><label>Maître d'ouvrage (nom)</label><input type="text" id="ci-mo" value="${c.mo||''}" placeholder="ex. M. DUPONT"></div>
    <div class="form-full"><label>Adresse du chantier</label><input type="text" id="ci-addr" value="${c.adresse||''}" placeholder="ex. 12 rue de la Paix – 59000 Lille"></div>
    <div class="form-full"><label>Nom de l'opération</label><input type="text" id="ci-op" value="${c.operation||''}" placeholder="ex. RÉNOVATION MAISON"></div>
    <div class="form-row">
      <div><label>N° CR de départ</label><input type="text" id="ci-num" value="${c.meta.num||'1'}"></div>
      <div><label>Phase</label><input type="text" id="ci-phase" value="${c.meta.phase||''}" placeholder="Phase 1 Exécution"></div>
    </div>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="${isNew?'deleteChantier(\''+id+'\');closeModal()':'closeModal()'}">Annuler</button>
      <button class="btn btn-primary" onclick="saveChantierInfo('${id}',${isNew})">Enregistrer</button>
    </div>
    ${!isNew ? `<button class="btn" style="width:100%;margin-top:8px;color:var(--red);border:1px solid var(--red);background:var(--red-bg)" onclick="deleteChantier('${id}')">Supprimer ce chantier</button>` : ''}
  `;
  document.getElementById('modal-bg').style.display = 'flex';
}

function saveChantierInfo(id, isNew) {
  const c = chantiers.find(x => x.id === id);
  c.mo = document.getElementById('ci-mo').value;
  c.adresse = document.getElementById('ci-addr').value;
  c.operation = document.getElementById('ci-op').value;
  c.meta.num = document.getElementById('ci-num').value;
  c.meta.phase = document.getElementById('ci-phase').value;
  save();
  closeModal();
  if (isNew) {
    openChantier(id);
  } else {
    renderChantiersList();
  }
}

function deleteChantier(id) {
  if (!confirm('Supprimer ce chantier et toutes ses données ?')) return;
  chantiers = chantiers.filter(c => c.id !== id);
  if (chantiers.length === 0) chantiers = [JSON.parse(JSON.stringify(BOULANGE_CHANTIER))];
  currentId = chantiers[0].id;
  save();
  closeModal();
  renderChantiersList();
}

// ─── ROUTING PRINCIPAL ───────────────────────────────────────────────────────
const isWide = () => window.innerWidth >= 768;

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  render();
}

function render() {
  const c = C();
  document.getElementById('topbar-mo').textContent = c.mo || 'Chantier sans nom';
  document.getElementById('topbar-num').textContent = 'N°' + (c.meta.num || '—');
  const sb = document.getElementById('sidebar');
  const el = document.getElementById('content');
  if (isWide() && currentTab === 'saisie') {
    sb.style.display = 'block';
    sb.innerHTML = renderSidebar();
  } else {
    sb.style.display = 'none';
  }
  if (currentTab === 'saisie') el.innerHTML = isWide() ? renderLotDetail() : renderSaisie();
  else if (currentTab === 'meta') el.innerHTML = renderMeta();
  else if (currentTab === 'intervenants') el.innerHTML = renderIntervenants();
  else if (currentTab === 'config') el.innerHTML = renderConfig();
  document.getElementById('bottom-bar').innerHTML = `
    <button class="btn btn-outline" onclick="resetSaisie()">↺ Nouveau CR</button>
    <button class="btn btn-primary" onclick="generateDocx()">⬇ Générer .docx</button>
  `;
}

  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`CR_${(c.mo||'Chantier').replace(/\s+/g,'_')}_N${m.num}_${(m.date||'').replace(/-/g,'')}.docx`;
  a.click(); URL.revokeObjectURL(url);
  showToast('Fichier .docx téléchargé !');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
load();
window.addEventListener('resize', ()=>{ if(currentId) render(); });
// Démarrage : si un seul chantier, ouvrir directement
if(chantiers.length===1) {
  openChantier(chantiers[0].id);
} else {
  showChantiers();
}
</script>
